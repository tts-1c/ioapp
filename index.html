<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Покупки</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-separator: #C6C6C8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            color: #000;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 16px 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
        }

        header h1 { font-size: 34px; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .inner-title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin: 0; flex: 1; }

        .container { padding: 16px; }

        /* Поля ввода и кнопка (Исправленная верстка) */
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            width: 100%;
            box-sizing: border-box;
        }

        input {
            background: #E3E3E8;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 17px;
            outline: none;
            min-width: 0; /* Позволяет flex-элементам сжиматься */
        }

        #new-list-name, #new-item-name { flex: 1; }
        #new-item-qty { width: 65px; flex: 0 0 auto; text-align: center; }

        .btn-circle {
            width: 34px; height: 34px;
            background-color: var(--ios-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; color: white; font-size: 24px; font-weight: 300;
            flex: 0 0 auto; /* Запрещаем сжатие кнопки */
        }

        .btn-back {
            color: var(--ios-blue); font-size: 17px; background: none; border: none;
            display: flex; align-items: center; padding: 0; margin-bottom: 10px;
        }

        /* Таблица со свайпами */
        .table-view {
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .row-wrapper {
            position: relative;
            background-color: var(--ios-red);
            border-bottom: 0.5px solid var(--ios-separator);
            overflow: hidden;
        }

        .row-wrapper:last-child { border-bottom: none; }

        .table-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--ios-card);
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease-out;
            touch-action: pan-y;
        }

        .swipe-actions {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            display: flex; z-index: 1;
        }

        .action-btn {
            width: 85px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 15px; border: none;
        }
        .action-edit { background-color: var(--ios-blue); }
        .action-delete { background-color: var(--ios-red); }

        .list-name { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        .list-date { font-size: 13px; color: #8E8E93; margin-top: 2px; }
        .item-text { font-size: 17px; flex: 1; text-align: left; }
        .item-qty { font-size: 17px; color: #8E8E93; margin-left: 10px; }

        .bought { background-color: #F2F2F7 !important; }
        .bought .item-text, .bought .item-qty { text-decoration: line-through; color: #8E8E93; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="view-main">
    <header><h1>Списки</h1></header>
    <div class="container">
        <div class="input-row">
            <input type="text" id="new-list-name" placeholder="Новый список">
            <button class="btn-circle" onclick="newList()">+</button>
        </div>
        <div id="lists-container" class="table-view"></div>
    </div>
</div>

<div id="view-items" class="hidden">
    <header>
        <button class="btn-back" onclick="showMain()">‹ Назад</button>
        <h1 id="current-list-title" class="inner-title"></h1>
    </header>
    <div class="container">
        <div class="input-row">
            <input type="text" id="new-item-name" placeholder="Товар">
            <input type="text" id="new-item-qty" placeholder="Кол-во">
            <button class="btn-circle" onclick="addItem()">+</button>
        </div>
        <div id="items-container" class="table-view"></div>
    </div>
</div>

<script>
    let db, currentListId = null, startX = 0, startY = 0, currentXOffset = 0, activeRow = null, isHorizontalSwipe = false;

    const request = indexedDB.open("ShoppingDB", 3);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("lists")) db.createObjectStore("lists", { keyPath: "id", autoIncrement: true });
        if (!db.objectStoreNames.contains("items")) db.createObjectStore("items", { keyPath: "id", autoIncrement: true }).createIndex("listId", "listId");
    };
    request.onsuccess = (e) => { db = e.target.result; renderLists(); };

    function haptic() { if (navigator.vibrate) navigator.vibrate(15); }

    // Логика свайпа
    function tStart(e) {
        startX = e.touches.clientX;
        startY = e.touches.clientY;
        isHorizontalSwipe = false;
        if (activeRow && activeRow !== e.currentTarget) closeSwipe();
        const style = e.currentTarget.style.transform;
        currentXOffset = style && style.includes('translateX') ? parseInt(style.replace(/[^\d-]/g, '')) : 0;
    }

    function tMove(e) {
        let diffX = startX - e.touches.clientX;
        let diffY = Math.abs(startY - e.touches.clientY);
        if (!isHorizontalSwipe && Math.abs(diffX) > 10 && Math.abs(diffX) > diffY) isHorizontalSwipe = true;
        if (isHorizontalSwipe) {
            if (e.cancelable) e.preventDefault();
            let newX = currentXOffset - diffX;
            if (newX > 0) newX /= 4; 
            if (newX < -200) newX = -200;
            e.currentTarget.style.transition = 'none';
            e.currentTarget.style.transform = `translateX(${newX}px)`;
        }
    }

    function tEnd(e) {
        if (!isHorizontalSwipe) return;
        let row = e.currentTarget;
        let diffX = startX - e.changedTouches.clientX;
        let finalX = currentXOffset - diffX;
        row.style.transition = 'transform 0.3s ease-out';
        if (finalX < -70) {
            row.style.transform = `translateX(-170px)`;
            activeRow = row;
        } else {
            row.style.transform = `translateX(0)`;
            activeRow = null;
        }
    }

    function closeSwipe() {
        if (activeRow) { activeRow.style.transform = `translateX(0)`; activeRow = null; }
    }

    // Рендер и функции БД
    function renderLists() {
        const container = document.getElementById('lists-container');
        container.innerHTML = '';
        db.transaction("lists").objectStore("lists").getAll().onsuccess = (e) => {
            e.target.result.forEach(list => {
                const div = document.createElement('div');
                div.className = 'row-wrapper';
                div.innerHTML = `
                    <div class="swipe-actions">
                        <button class="action-btn action-edit" onclick="editList(${list.id},'${list.name}')">Правка</button>
                        <button class="action-btn action-delete" onclick="deleteList(${list.id})">Удалить</button>
                    </div>
                    <div class="table-row" ontouchstart="tStart(event)" ontouchmove="tMove(event)" ontouchend="tEnd(event)" onclick="if(!activeRow) showItems(${list.id}, '${list.name}')">
                        <div><span class="list-name">${list.name}</span><div class="list-date">${list.date}</div></div>
                    </div>`;
                container.appendChild(div);
            });
        };
    }

    function renderItems() {
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        const index = db.transaction("items").objectStore("items").index("listId");
        index.getAll(IDBKeyRange.only(currentListId)).onsuccess = (e) => {
            e.target.result.forEach(item => {
                const div = document.createElement('div');
                div.className = 'row-wrapper';
                div.innerHTML = `
                    <div class="swipe-actions">
                        <button class="action-btn action-edit" onclick="editItem(${item.id},'${item.name}','${item.qty||''}')">Правка</button>
                        <button class="action-btn action-delete" onclick="deleteItem(${item.id})">Удалить</button>
                    </div>
                    <div class="table-row ${item.bought ? 'bought' : ''}" ontouchstart="tStart(event)" ontouchmove="tMove(event)" ontouchend="tEnd(event)" onclick="if(!activeRow) toggleItem(${item.id}, ${item.bought})">
                        <span class="item-text">${item.name}</span>
                        <span class="item-qty">${item.qty || ''}</span>
                    </div>`;
                container.appendChild(div);
            });
        };
    }

    document.getElementById('new-list-name').onkeypress = (e) => { if (e.key === 'Enter') newList(); };
    document.getElementById('new-item-name').onkeypress = (e) => { if (e.key === 'Enter') addItem(); };
    document.getElementById('new-item-qty').onkeypress = (e) => { if (e.key === 'Enter') addItem(); };

    function newList() {
        const i = document.getElementById('new-list-name'); if (!i.value) return;
        const t = db.transaction(["lists"], "readwrite");
        t.objectStore("lists").add({ name: i.value, date: new Date().toLocaleDateString('ru-RU') });
        t.oncomplete = () => { i.value = ''; renderLists(); haptic(); i.focus(); };
    }

    function addItem() {
        const ni = document.getElementById('new-item-name'), qi = document.getElementById('new-item-qty'); if (!ni.value) return;
        const t = db.transaction(["items"], "readwrite");
        t.objectStore("items").add({ listId: currentListId, name: ni.value, qty: qi.value, bought: false });
        t.oncomplete = () => { ni.value = ''; qi.value = ''; renderItems(); haptic(); ni.focus(); };
    }

    function toggleItem(id, s) {
        haptic(); const os = db.transaction(["items"], "readwrite").objectStore("items");
        os.get(id).onsuccess = (e) => { const d = e.target.result; d.bought = !s; os.put(d).onsuccess = renderItems; };
    }

    function editList(id, old) {
        const n = prompt("Название:", old); if (n) {
            const os = db.transaction(["lists"], "readwrite").objectStore("lists");
            os.get(id).onsuccess = (e) => { let d = e.target.result; d.name = n; os.put(d).onsuccess = renderLists; };
        }
        closeSwipe();
    }

    function editItem(id, n, q) {
        const nn = prompt("Товар:", n); if (nn === null) return closeSwipe();
        const nq = prompt("Кол-во:", q); const os = db.transaction(["items"], "readwrite").objectStore("items");
        os.get(id).onsuccess = (e) => { let d = e.target.result; d.name = nn; d.qty = nq; os.put(d).onsuccess = renderItems; };
        closeSwipe();
    }

    function deleteList(id) { db.transaction(["lists", "items"], "readwrite").objectStore("lists").delete(id); renderLists(); activeRow = null; haptic(); }
    function deleteItem(id) { db.transaction(["items"], "readwrite").objectStore("items").delete(id).onsuccess = renderItems; activeRow = null; haptic(); }

    function showItems(id, name) {
        currentListId = id; document.getElementById('current-list-title').innerText = name;
        document.getElementById('view-main').classList.add('hidden'); document.getElementById('view-items').classList.remove('hidden');
        renderItems(); setTimeout(() => document.getElementById('new-item-name').focus(), 400);
    }

    function showMain() { document.getElementById('view-main').classList.remove('hidden'); document.getElementById('view-items').classList.add('hidden'); renderLists(); }
</script>
</body>
</html>
